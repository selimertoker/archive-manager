<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Archive</title>
		<style>
@keyframes yanardoner-gry { 0% {background-color: #555;} 50% {background-color: #556;} 100% {background-color: #555;} }
@keyframes yanardoner-red { 0% {background-color: #940;} 50% {background-color: #960;} 100% {background-color: #940;} }
#overlay { display: none; position: fixed; top: 0px; left: 0px; width: 100%; height: 100%; background-color: #000d; z-index: 1001; justify-content: center; align-items: center; }
#main-bar   { animation: yanardoner-gry 2s infinite; height: 40px; width: 100%; display: flex; position: sticky; top: 0px;  left: 0px; z-index: 1000; }
#select-bar { animation: yanardoner-red 2s infinite; height: 40px; width: 100%; display: none; position: sticky; top: 40px; left: 0px; z-index: 1000; }
button    { background-color: #dfd; padding: 0px 10px 0px 10px; margin: auto; height: 30px; border-radius: 10px; font-size: 20px; border: none; transition-duration: 0.5s; }
input     { background-color: #fff; padding: 0px 10px 0px 10px; margin: auto; height: 30px; border-radius: 10px; font-size: 20px; border: none; }
.bar-text { background-color: #777; padding: 0px 10px 0px 10px; margin: auto; height: 24px; border-radius: 0px;  font-size: 20px; border: solid 3px #aaa; }
body { color: #333; background-color: #ddd; text-align: center; transition-duration: 0.5s; }
body.darkmode { color: #ccc; background-color: #222; }
button:hover { background-color: #ddf; }
button:active { background-color: #f0f; }
table { width: 100%; }
td.selected { background-color: #ff0; }
.btn-red { background-color: #f00; }
.btn-ylw { background-color: #ff0; }
.btn-grn { background-color: #0f0; }
#overlay { height: 100%; width: 100%; align-content: center }
#lightbox-media { max-width: 90vw; max-height: 90vh; margin: auto; object-fit:scale-down; transform-origin: 0 0; transition: transform 0.01s ease-out;}
		</style>
	</head>
	<body>
		<div id="main-bar">
			<span id="item-count" class="bar-text" >0 Items</span>
			<button id="reload-table-btn" onclick="reload_table()">Reload Item Table</button>
			<button id="ch-order-mode-btn" onclick="
						       const b=document.getElementById('ch-order-mode-btn');
						       config.reverseordering=false;
						       if (config.ordering=='time') { config.ordering='name'; b.textContent='Forward Name Ordering'; }
						       else                         { config.ordering='time'; b.textContent='Forward Time Ordering'; }
						       reload_table();
						       return false;
						       " oncontextmenu="
							 const b=document.getElementById('ch-order-mode-btn');
							 config.reverseordering=true;
							 if (config.ordering=='time') { config.ordering='name'; b.textContent='Reverse Name Ordering'; }
							 else                         { config.ordering='time'; b.textContent='Reverse Time Ordering'; }
							 reload_table();
							 return false;
							 ">Forward Name Ordering</button>
			<button id="ch-theme-btn" onclick="
						  const b=document.getElementById('ch-theme-btn');
						  document.body.classList.toggle('darkmode');
						  const div=document.getElementsByTagName('div')[0];
						  if (config.darktheme) { config.darktheme=false;b.textContent='Light Theme'; }
						  else                  { config.darktheme=true; b.textContent='Dark Theme' ; }
						  ">Light Theme</button>
			<button id="ch-table-width-btn" onclick="
							document.getElementById('ch-table-width-btn').textContent='Table Width: '+(++config.tablewidth);
							reload_table();
							;return false;
							" oncontextmenu="
							  document.getElementById('ch-table-width-btn').textContent='Table Width: '+(--config.tablewidth);
							  reload_table();
							  ;return false;
							  ">Table Width: 12</button>
			<button id="ch-disp-mode-btn" onclick="
						      const b=document.getElementById('ch-disp-mode-btn');
						      if      (config.display=='untagged') { config.display='all';     b.textContent='Display All'; }
						      else if (config.display=='tagged')   { config.display='untagged';b.textContent='Display Untagged'; }
						      else                                 { config.display='tagged';  b.textContent='Display Tagged'; }
						      reload_table();
						      ">Display All</button>
			<button id="item-sel-btn" onclick="
						  const b=document.getElementById('item-sel-btn');
						  if (config.selectmode) {
						  config.selectmode=false;
						  b.textContent='Item Select Mode'
						  b.classList.remove('btn-grn');
						  document.getElementById('select-bar').style.display='none';
						  document.getElementById('item-table').removeEventListener('contextmenu', select_item);
						  } else {
						  config.selectmode=true;
						  b.textContent=selecteditems.size+' Items Selected'
						  b.classList.add('btn-grn');
						  document.getElementById('select-bar').style.display='flex';
						  document.getElementById('item-table').addEventListener('contextmenu', select_item);
						  }
						  ">Item Select Mode</button>
			<input id="tag-search" placeholder="search"></input>
		</div>
		<div id="select-bar">
			<input  id="item-sel-f-pref" value="bash archive-manager.sh -G"></input>
			<span class="bar-text" >(itemname)</span>
			<input  id="item-sel-f-suff" placeholder="write tag here"></input>
			<button id="copy-fitems-btn" onclick="
						     let copystr='';
						     const pref=document.getElementById('item-sel-f-pref').value
						     const suff=document.getElementById('item-sel-f-suff').value
						     for (const item of selecteditems) copystr+=pref+' '+item+' '+suff+';';
						     alert(copystr);
						     console.log(copystr);
						     ">Copy Formatted Items</button>
			<button id="clear-items-btn" onclick="
						     document.querySelectorAll('td.selected').forEach(x => {x.classList.remove('selected'); });
						     selecteditems.clear();
						     document.getElementById('item-sel-btn').textContent='0 Items Selected';
						     ">Clear Selection</button>
		</div>

		<div id="overlay"> <div id="lightbox"> </div> </div>

		<script> // handle thmdb
			var config={reverseordering:false,ordering:"name",darktheme:false,tablewidth:12,display:"all",selectmode:false,tagsearch:"",itemlist:[],lastviewedindex:0};
			var lightboxconfig={zoom:1.0,maxzoom:100.0,minzoom:1.0,zoomstep:0.1,panx:0.0,pany:0.0};
			var itemextension=""; // jxl, mp4
			var tardata=null;
			var selecteditems= new Set();
			var thms=null;

			async function fetch_thmdb() {
				const response = await fetch('thm.tar.zst');
				const compressedData = new Uint8Array(await response.arrayBuffer());
				tardata = fzstd.decompress(compressedData);
			}
			function parse_thmdb() {
				thms = [];
				let offset = 0;
				let longFileName = null;
				while (offset < tardata.length) {
					const header = new TextDecoder().decode(tardata.slice(offset, offset + 512));
					const name = header.slice(0, 100).replace(/\0.*$/, '');
					const prefix = header.slice(345, 500).replace(/\0.*$/, '');
					const typeFlag = header.charCodeAt(156);
					const size = parseInt(header.slice(124, 136), 8) || 0;
					const time = parseInt(header.slice(136, 148), 8);
					if (!name && !prefix) break;
					if (typeFlag === 76 /* 'L' */) {
						const longNameEnd = offset + 512 + size;
						longFileName = new TextDecoder().decode(tardata.slice(offset + 512, longNameEnd)).replace(/\0.*$/, '');
						offset = longNameEnd + (512 - (size % 512 || 512));
						continue;
					}
					const fullName = longFileName || name;
					longFileName = null;
					const contentStart = offset + 512;
					const contentEnd = contentStart + size;
					const content = tardata.slice(contentStart, contentEnd);
					if (fullName !== "thm/") thms.push({
						name:fullName.replace(/^thm\//,
							"").replace(/\.webp$/,""), time, image:URL.createObjectURL(new Blob([content], { type: 'image/webp' })) });
					offset = contentEnd + (512 - (size % 512 || 512));
				}
			}

			function handle_thms_order() {
				if      (config.ordering == "name") { thms.sort((a, b) => a.name.localeCompare(b.name)); }
				else if (config.ordering == "time") { thms.sort((a, b) => a.time - b.time); }
				if      (config.reverseordering) { thms.reverse(); }
			}

			function load_thms() {
				let oldtable=document.getElementById("item-table");
				if (oldtable !== null ) {
					document.getElementById('item-table').removeEventListener('click', handle_item_table_click);
					oldtable.remove();
				}
				const table = document.createElement('table');
				table.id = "item-table";
				let row = table.insertRow();
				let i=0;
				config.itemlist=[];
				if (config.display=="untagged") {
					thmsloop: for (const file of thms) {
						if (file.name.length > 65) { continue thmsloop; }
						if (i % config.tablewidth === 0 && i !== 0) { row = table.insertRow(); }
						const cell = row.insertCell();
						const img = document.createElement('img');
						img.src = file.image;
						img.title = "sto/"+file.name+"."+itemextension;
						cell.appendChild(img);
						config.itemlist.push(img.title);
						i++;
					}
				}
				else if (config.display=="tagged") {
					thmsloop: for (const file of thms) {
						if (file.name.length <= 65) { continue thmsloop; }
						if (!file.name.includes(config.tagsearch)) { continue thmsloop; }
						if (i % config.tablewidth === 0 && i !== 0) { row = table.insertRow(); }
						const cell = row.insertCell();
						const img = document.createElement('img');
						img.src = file.image;
						img.title = "sto/"+file.name+"."+itemextension;
						cell.appendChild(img);
						const tagDiv = document.createElement('div');
						tagDiv.textContent = file.name.slice(65).replaceAll("-"," ");
						cell.appendChild(tagDiv);
						config.itemlist.push(img.title);
						i++;
					}
				}
				else {
					thmsloop: for (const file of thms) {
						for (const tag of config.tagsearch) { if (!file.name.includes(tag)) { continue thmsloop; } }
						if (!file.name.includes(config.tagsearch)) { continue thmsloop; }
						if (i % config.tablewidth === 0 && i !== 0) { row = table.insertRow(); }
						const cell = row.insertCell();
						const img = document.createElement('img');
						img.src = file.image;
						img.title = "sto/"+file.name+"."+itemextension;
						cell.appendChild(img);
						if (file.name.length > 65) {
							const tagDiv = document.createElement('div');
							tagDiv.innerHTML = file.name.slice(65).replaceAll("_"," ").replaceAll("-","<br>");
							cell.appendChild(tagDiv);
						}
						config.itemlist.push(img.title);
						i++;
					}
				}
				document.body.appendChild(table);
				document.getElementById("item-count").textContent=i+" Items";

				document.getElementById('item-table').addEventListener('click', handle_item_table_click);
			}

			function reload_table() {
				const b=document.getElementById('reload-table-btn');
				config.tagsearch=document.getElementById("tag-search").value;
				handle_thms_order();
				load_thms();
				b.classList.remove('btn-ylw'); b.classList.add('btn-grn'); setTimeout(() => { b.classList.remove('btn-grn'); }, 1000);
			}

			function select_item(event) {
				const b=document.getElementById('item-sel-btn');
				event.preventDefault();

				const bgclasslist = event.target.parentElement.classList;
				const itemname = event.target.title.replace(/.*\//,"").replace(/\..*/,"");

					if (bgclasslist.contains('selected')) { bgclasslist.remove('selected'); selecteditems.delete(itemname); }
					else { bgclasslist.add('selected'); selecteditems.add(itemname); }
					b.textContent=selecteditems.size+" Items Selected"
				}
			function handle_item_table_click(event) {
				if (event.target && event.target.tagName === "IMG") {
					lightbox_an_item(event.target.title);
				}
			}
			function handle_lightbox_keydown() {
				if (document.getElementById('overlay').style.display == "flex") {
				if (event.key === 'Escape') lightbox_close();
				else if (event.key === "ArrowLeft") lightbox_switch_media(to_right=false)
				else if (event.key === "ArrowRight") lightbox_switch_media(to_right=true)
				}
			}
			function lightbox_an_item(title) {
				lightboxconfig={zoom:1.0,maxzoom:100.0,minzoom:1.0,zoomstep:0.1,panx:0.0,pany:0.0};
				lightbox_media_element = document.getElementById('lightbox-media');
				lightbox_media_element.src = title;
				config.lastviewedindex = config.itemlist.indexOf(title);
				lightbox_media_element.style.transform = "scale(1) translate(0px,0px)";
				document.getElementById('overlay').style.display = 'flex';
				if (title.includes("mp4")) lightbox_media_element.play();
			}

			function lightbox_switch_media(to_right) {
				if (to_right && config.lastviewedindex != config.itemlist.length-1)
					lightbox_an_item(config.itemlist[config.lastviewedindex+1]);
				else if (!to_right && config.lastviewedindex != 0)
					lightbox_an_item(config.itemlist[config.lastviewedindex-1]);
			}

			function lightbox_close() {
				document.getElementById('overlay').style.display = 'none';
				if (itemextension==="mp4") document.getElementById("lightbox-media").pause();
			}

			function handle_lightbox_scroll(event) {
				event.preventDefault(); // Prevent page scroll

				const lightbox_media_element = document.getElementById("lightbox-media");

				const oldZoom = lightboxconfig.zoom;

				if      (event.deltaY < 0) lightboxconfig.zoom *= 1 + lightboxconfig.zoomstep;
				else if (event.deltaY > 0) lightboxconfig.zoom /= 1 + lightboxconfig.zoomstep;

				lightboxconfig.zoom = Math.min(Math.max(lightboxconfig.zoom, lightboxconfig.minzoom), lightboxconfig.maxzoom);

				const rect = lightbox_media_element.getBoundingClientRect();

				lightboxconfig.panx -= (event.clientX - rect.left) * (lightboxconfig.zoom / oldZoom - 1);
				lightboxconfig.pany -= (event.clientY - rect.top) * (lightboxconfig.zoom / oldZoom - 1);

				lightbox_media_element.style.transform = "translate(" + lightboxconfig.panx + "px, " + lightboxconfig.pany + "px) scale(" + lightboxconfig.zoom + ")";
			}

			async function main() {
				let url=window.location.href;
				let isimg=url.includes("img");
				let isvid=url.includes("vid");
				let lightboxmedia=0;
				if (!isimg && !isvid) {
					itemextension = prompt("Could not get archive type (img/vid) from URL, what is the item extension (jxl/mp4)");
					if (itemextension == "jxl") isimg=true;
					if (itemextension == "mp4") isvid=true;
				}
				if (isimg && !isvid) {
					itemextension="jxl";
					lightboxmedia = document.createElement('img');
					lightboxmedia.id="lightbox-media";
					document.getElementById("overlay").appendChild(lightboxmedia);
				}
				else if (!isimg && isvid) {
					itemextension="mp4";
					lightboxmedia = document.createElement('video');
					lightboxmedia.id="lightbox-media";
					lightboxmedia.controls=true;
					document.getElementById("overlay").appendChild(lightboxmedia);
				}
				else {
					alert("invalid archive type");
				}
				document.getElementById("tag-search").addEventListener("keydown", function(event) {
					if (event.key === "Enter") {
						config.tagsearch=document.getElementById("tag-search").value;
						load_thms();
					}
				});

				await fetch_thmdb().catch(console.error);
				parse_thmdb();
				handle_thms_order();
				load_thms();
				document.getElementById('overlay').addEventListener('click', lightbox_close);
				document.addEventListener("keydown", handle_lightbox_keydown);
				lightboxmedia.addEventListener("wheel", handle_lightbox_scroll);
			}
		</script>
